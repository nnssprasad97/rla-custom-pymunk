name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop the build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Verify imports
        run: |
          python -c "from environment import DoublePendulumEnv; print('Environment import OK')"
          python -c "import train; print('Train import OK')"
          python -c "import plot_results; print('Plot import OK')"

      - name: Run environment smoke test
        run: |
          python -c "
          from environment import DoublePendulumEnv
          env = DoublePendulumEnv(reward_type='shaped')
          obs, info = env.reset()
          assert obs.shape == (6,), f'Expected obs shape (6,), got {obs.shape}'
          action = env.action_space.sample()
          obs, reward, terminated, truncated, info = env.step(action)
          assert obs.shape == (6,), f'Expected obs shape (6,), got {obs.shape}'
          env.close()
          print('Environment smoke test PASSED')
          "
