version: '3.8'
services:
  app:
    build: .
    volumes:
      - .:/app
  train:
    build: .
    volumes:
      - .:/app
    command: python train.py --timesteps 200000 --reward_type shaped --save_path models/shaped

  train_baseline:
    build: .
    volumes:
      - .:/app
    command: python train.py --timesteps 200000 --reward_type baseline --save_path models/baseline
  evaluate:
    build: .
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/app
    command: python evaluate.py --model_path models/ppo_model.zip
