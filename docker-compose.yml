version: '3.8'
services:
  app:
    build: .
    volumes:
      - .:/app
  train:
    build: .
    volumes:
      - .:/app
    command: python train.py --timesteps 200000 --reward_type shaped
  evaluate:
    build: .
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/app
    command: python evaluate.py --model_path models/ppo_model.zip
